# Workflow for deploying Vite React app to GitHub Pages
name: Deploy Vite React App to Pages

on:
  # Runs automatically on pushes to the main branch
  push:
    branches: ["main"]
  # Allows manual triggering from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      # 1. Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      # 2. Install packages defined in package.json
      - name: Install Dependencies
        run: npm install
        
      # 3. Compile the Vite React code into browser-ready HTML/JS/CSS
      - name: Build the App
        run: npm run build
        
      # 4. Prepare GitHub Pages environment
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      # 5. Upload ONLY the compiled output folder
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
