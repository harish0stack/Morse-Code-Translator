name: Deploy Vite React App to GitHub Pages

on:
  # Runs automatically every time you push to the main branch
  push:
    branches: ["main"]
  # Allows you to trigger this manually from the Actions tab
  workflow_dispatch:

# Sets permissions to allow the deployment
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. We must install Node.js to build the React project
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # This speeds up future runs

      # 2. Install the project's packages
      - name: Install dependencies
        run: npm install

      # 3. Translate the React code into browser-ready HTML/JS/CSS
      - name: Build project
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 4. Upload ONLY the compiled Vite folder ('dist')
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Critical fix: Vite uses 'dist', not the root '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
